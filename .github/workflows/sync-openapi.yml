name: Sync OpenAPI

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Public OpenAPI JSON URL to sync from
        required: false
        default: https://www.droprfid.com/api/v1/openapi.json

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: ${{ inputs.source_url || 'https://www.droprfid.com/api/v1/openapi.json' }}

    steps:
      - name: Checkout api-client
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync OpenAPI spec
        run: ./scripts/sync-openapi.sh --source-url "$SOURCE_URL"

      - name: Validate OpenAPI JSON
        run: node -e "const spec = require('./openapi/openapi.json'); if (!spec.openapi || !spec.paths) process.exit(1)"

      - name: Commit changes
        run: |
          if git diff --quiet -- openapi/openapi.json; then
            echo "OpenAPI spec is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi/openapi.json
          git commit -m "Sync OpenAPI spec"
          git push
